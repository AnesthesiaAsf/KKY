<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>KKY‘WORLD</title>
    <style>
        /* 重置内外边距，保证 canvas 全屏 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
            position: relative;
            color: white;
        }

        /* Canvas 粒子背景层 */
        #particleCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            z-index: 0;
            background-color: #000000;
        }

        /* 所有前景内容放在这个容器里，高于 canvas */
        .content {
            position: relative;
            z-index: 10;
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px 20px;
            background-color: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(3px);
            border-radius: 24px;
            margin-top: 5vh;
            margin-bottom: 5vh;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        h1 {
            color: #ffffff;
            text-align: center;
            margin-bottom: 20px;
            font-size: 2.5em;
            text-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        h2 {
            color: #ffdd99;
            border-left: 5px solid #ffaa66;
            padding-left: 15px;
            margin: 30px 0 20px 0;
        }

        .public-section {
            text-align: center;
        }

        .avatar img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #ffaa66;
            margin: 20px auto;
            box-shadow: 0 0 15px rgba(0,0,0,0.3);
        }

        .bio {
            font-size: 1.2em;
            line-height: 1.6;
            color: #f0f0f0;
            max-width: 700px;
            margin: 0 auto 20px;
        }

        .login-area {
            background: rgba(30,30,40,0.8);
            padding: 25px;
            border-radius: 20px;
            text-align: center;
            margin-top: 30px;
            backdrop-filter: blur(4px);
        }

        .login-area input {
            padding: 12px;
            width: 250px;
            border: 1px solid #ffaa66;
            border-radius: 30px;
            font-size: 16px;
            background: rgba(255,255,255,0.2);
            color: white;
            outline: none;
        }

        .login-area input::placeholder {
            color: #ddd;
        }

        .login-area button {
            padding: 12px 28px;
            background: #ff884d;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s;
            margin-left: 10px;
        }

        .login-area button:hover {
            background: #ff6622;
        }

        #errorMsg {
            margin-top: 12px;
            font-size: 14px;
        }

        a {
            color: #ffaa66;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        hr {
            border-color: rgba(255,255,255,0.2);
            margin: 20px 0;
        }

        @media (max-width: 768px) {
            .content {
                margin: 20px;
                padding: 20px;
            }
            .login-area input {
                width: 70%;
                margin-bottom: 10px;
            }
            .login-area button {
                margin-left: 0;
            }
            h1 {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>

    <canvas id="particleCanvas"></canvas>

    <div class="content">
        <div class="public-section">
            <h1>✨ 你好，我是 KKY ✨</h1>
            <div class="avatar">
                <img src="avatar.jpg" alt="头像" onerror="this.src='https://via.placeholder.com/150?text=KKY'">
            </div>
            <p class="bio">🌟 欢迎来到 KKY 的个人世界。这里记录了生活、热爱与未来的规划。 🌟</p>
            <p>📫 联系我：<a href="mailto:kky@example.com">kky@example.com</a></p>
            <hr>
        </div>

        <div class="login-area">
            <h2>🔐 私密空间入口</h2>
            <p>输入密码后可以查看照片库、灵魂伴侣和职业规划。</p>
            <input type="password" id="passwordInput" placeholder="请输入密码">
            <button id="loginBtn">进入</button>
            <div id="errorMsg"></div>
        </div>
    </div>

    <script>
        // ======================== 粒子系统 ========================
        (function() {
            const canvas = document.getElementById('particleCanvas');
            if (!canvas) return;
            let ctx = canvas.getContext('2d');
            let width = window.innerWidth;
            let height = window.innerHeight;

            const PARTICLE_COUNT = 180;      // 减少一点提升性能
            const MAX_SPEED = 1.2;
            const MOUSE_RADIUS = 120;
            const MOUSE_FORCE = 0.8;
            const EDGE_BOUNCE = 0.9;
            const FRICTION = 0.98;

            let particles = [];
            let mouseX = width/2, mouseY = height/2;
            let mousePresent = false;

            class Particle {
                constructor(x, y, vx, vy, size, color) {
                    this.x = x;
                    this.y = y;
                    this.vx = vx;
                    this.vy = vy;
                    this.size = size;
                    this.color = color;
                }
                update() {
                    this.vx *= FRICTION;
                    this.vy *= FRICTION;
                    if (mousePresent) {
                        let dx = mouseX - this.x;
                        let dy = mouseY - this.y;
                        let dist = Math.hypot(dx, dy);
                        if (dist < MOUSE_RADIUS && dist > 0.5) {
                            let force = MOUSE_FORCE * (1 - dist / MOUSE_RADIUS);
                            let angle = Math.atan2(dy, dx);
                            this.vx += Math.cos(angle) * force;
                            this.vy += Math.sin(angle) * force;
                            let spd = Math.hypot(this.vx, this.vy);
                            if (spd > MAX_SPEED) {
                                this.vx = (this.vx / spd) * MAX_SPEED;
                                this.vy = (this.vy / spd) * MAX_SPEED;
                            }
                        }
                    }
                    this.x += this.vx;
                    this.y += this.vy;
                    if (this.x - this.size < 0) { this.x = this.size; this.vx = -this.vx * EDGE_BOUNCE; }
                    if (this.x + this.size > width) { this.x = width - this.size; this.vx = -this.vx * EDGE_BOUNCE; }
                    if (this.y - this.size < 0) { this.y = this.size; this.vy = -this.vy * EDGE_BOUNCE; }
                    if (this.y + this.size > height) { this.y = height - this.size; this.vy = -this.vy * EDGE_BOUNCE; }
                }
                draw(ctx) {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fillStyle = this.color;
                    ctx.fill();
                    ctx.shadowBlur = 6;
                    ctx.shadowColor = this.color;
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }
            }

            function randomParticleColor() {
                const hue = 30 + Math.random() * 30;
                const sat = 70 + Math.random() * 30;
                const lit = 60 + Math.random() * 40;
                return `hsl(${hue}, ${sat}%, ${lit}%)`;
            }

            function initParticles() {
                particles = [];
                for (let i = 0; i < PARTICLE_COUNT; i++) {
                    let x = Math.random() * width;
                    let y = Math.random() * height;
                    let vx = (Math.random() - 0.5) * 0.8;
                    let vy = (Math.random() - 0.5) * 0.8;
                    let size = 2 + Math.random() * 4;
                    let color = randomParticleColor();
                    particles.push(new Particle(x, y, vx, vy, size, color));
                }
            }

            let animationId = null;
            function animate() {
                if (!ctx) return;
                ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
                ctx.fillRect(0, 0, width, height);
                for (let p of particles) {
                    p.update();
                    p.draw(ctx);
                }
                animationId = requestAnimationFrame(animate);
            }

            function onMouseMove(e) {
                mousePresent = true;
                mouseX = e.clientX;
                mouseY = e.clientY;
            }
            function onMouseLeave() { mousePresent = false; }
            function onTouchMove(e) {
                e.preventDefault();
                mousePresent = true;
                if (e.touches.length) {
                    mouseX = e.touches[0].clientX;
                    mouseY = e.touches[0].clientY;
                }
            }
            function onTouchEnd() { mousePresent = false; }
            function onResize() {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
                initParticles();
            }

            function startParticleSystem() {
                onResize();
                window.addEventListener('resize', onResize);
                window.addEventListener('mousemove', onMouseMove);
                window.addEventListener('mouseleave', onMouseLeave);
                window.addEventListener('touchmove', onTouchMove);
                window.addEventListener('touchend', onTouchEnd);
                animate();
            }

            startParticleSystem();
        })();

        // ======================== 登录逻辑 ========================
        const SECRET_PASSWORD = "123456";   // 请改成你的密码
        function login(password) {
            if (password === SECRET_PASSWORD) {
                sessionStorage.setItem("loggedIn", "true");
                return true;
            }
            return false;
        }

        const loginBtn = document.getElementById('loginBtn');
        const passwordInput = document.getElementById('passwordInput');
        const errorMsgDiv = document.getElementById('errorMsg');

        if (loginBtn) {
            loginBtn.addEventListener('click', function() {
                const pwd = passwordInput.value;
                if (login(pwd)) {
                    window.location.href = "secret.html";
                } else {
                    errorMsgDiv.innerText = "密码错误，请重试";
                    errorMsgDiv.style.color = "#ffaa66";
                }
            });
        }
    </script>
</body>
</html>
